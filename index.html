<script>
(function() {
  const translations = {
    ru: {
      title: 'Калькулятор топлива',
      radius: '📏 Радиус R (м)',
      length: '📐 Длина L (м)',
      maxLevel: '⚡ Макс. уровень',
      inner: 'Внутренний',
      outer: 'Наружный',
      wall: 'Стенка',
      mm: 'мм',
      fuelLevel: '⛽ Уровень топлива',
      full: 'Полный',
      hint: '⚡ двигайте ползунок',
      volume: 'Объём',
      filled: 'Заполнено',
      density: '⚖️ Плотность',
      mass: 'Масса:',
      cross: '🔵 Поперечный разрез',
      side: 'Вид сбоку'
    },
    en: {
      title: 'Fuel Calculator',
      radius: '📏 Radius R (m)',
      length: '📐 Length L (m)',
      maxLevel: '⚡ Max level',
      inner: 'Inner',
      outer: 'Outer',
      wall: 'Wall',
      mm: 'mm',
      fuelLevel: '⛽ Fuel level',
      full: 'Full',
      hint: '⚡ slide to adjust',
      volume: 'Volume',
      filled: 'Filled',
      density: '⚖️ Density',
      mass: 'Weight:',
      cross: '🔵 Cross section',
      side: 'Side view'
    }
  };

  let currentLang = 'ru';
  
  function applyLanguage(lang) {
    currentLang = lang;
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.getAttribute('data-i18n');
      if (translations[lang] && translations[lang][key]) {
        el.textContent = translations[lang][key];
      }
    });
    document.title = translations[lang].title + ' 🛢️';
    document.querySelectorAll('.lang-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.lang === lang);
    });
  }

  const radiusInput = document.getElementById('radiusInput');
  const lengthInput = document.getElementById('lengthInput');
  const diameterDisplay = document.getElementById('diameterDisplay');
  const levelSlider = document.getElementById('levelSlider');
  const levelInput = document.getElementById('levelInput');
  const volumeSpan = document.getElementById('volumeValue');
  const percentSpan = document.getElementById('percentValue');
  const fullVolumeSpan = document.getElementById('fullVolumeValue');
  const sideLengthLabel = document.getElementById('sideLengthLabel');
  const densityInput = document.getElementById('densityInput');
  const weightValue = document.getElementById('weightValue');
  const themeBtn = document.getElementById('themeBtn');
  const langSwitch = document.getElementById('langSwitch');
  const frontCanvas = document.getElementById('frontCanvas');
  const sideCanvas = document.getElementById('sideCanvas');
  const ctxFront = frontCanvas.getContext('2d');
  const ctxSide = sideCanvas.getContext('2d');

  let radius = 1.2;
  let length = 4.5;
  let level = 1.0;
  let isOuter = false;
  let wallThicknessMM = 4;
  let animFrame = null;

  let currentTheme = localStorage.getItem('theme') || 'dark';
  function setTheme(theme) {
    currentTheme = theme;
    document.documentElement.setAttribute('data-theme', theme);
    localStorage.setItem('theme', theme);
    themeBtn.textContent = theme === 'dark' ? '🌓' : '☀️';
  }
  themeBtn.addEventListener('click', () => setTheme(currentTheme === 'dark' ? 'light' : 'dark'));
  setTheme(currentTheme);

  langSwitch.addEventListener('click', () => {
    const newLang = currentLang === 'ru' ? 'en' : 'ru';
    applyLanguage(newLang);
  });

  function getInnerRadius() {
    if (isOuter) {
      return Math.max(0.001, radius - wallThicknessMM / 1000);
    }
    return radius;
  }

  function segmentArea(R, h) {
    if (h <= 0) return 0;
    if (h >= 2 * R) return Math.PI * R * R;
    const y = R - h;
    const acosArg = Math.min(1, Math.max(-1, y / R));
    return R * R * Math.acos(acosArg) - y * Math.sqrt(Math.max(0, R*R - y*y));
  }

  function calculate() {
    const R = getInnerRadius();
    const maxH = 2 * R;
    const h = Math.min(level, maxH);
    const area = segmentArea(R, h);
    const liquid = area * length;
    const full = Math.PI * R * R * length;
    const percent = full > 0 ? (liquid / full) * 100 : 0;
    return { liquid, full, percent, R, h, maxH };
  }

  function drawFront(R, h, liquidVol, percentVal) {
    const size = 300, padding = 16;
    const scale = (size - 2 * padding) / (2 * R);
    const cx = size/2, cy = size/2, rPx = R * scale;

    ctxFront.clearRect(0, 0, size, size);
    
    const bgGrad = ctxFront.createRadialGradient(cx, cy, 0, cx, cy, rPx);
    bgGrad.addColorStop(0, '#2a2a35');
    bgGrad.addColorStop(1, '#141419');
    ctxFront.beginPath();
    ctxFront.arc(cx, cy, rPx, 0, 2*Math.PI);
    ctxFront.fillStyle = bgGrad;
    ctxFront.fill();
    ctxFront.strokeStyle = '#4a4a5a';
    ctxFront.lineWidth = 2.5;
    ctxFront.stroke();

    if (h > 0 && h < 2 * R) {
      const y_surface = cy + rPx - h * scale;
      const dy = y_surface - cy;
      
      ctxFront.save();
      ctxFront.beginPath();
      ctxFront.arc(cx, cy, rPx, 0, 2*Math.PI);
      ctxFront.clip();

      const fuelGrad = ctxFront.createLinearGradient(cx, y_surface, cx, cy + rPx);
      fuelGrad.addColorStop(0, '#ffd966');
      fuelGrad.addColorStop(0.3, '#f7b32b');
      fuelGrad.addColorStop(1, '#b87d12');
      ctxFront.fillStyle = fuelGrad;

      ctxFront.beginPath();
      const startAngle = Math.asin(Math.max(-1, Math.min(1, dy / rPx)));
      const endAngle = Math.PI - startAngle;
      
      ctxFront.moveTo(cx + rPx * Math.cos(startAngle), cy + rPx * Math.sin(startAngle));
      ctxFront.arc(cx, cy, rPx, startAngle, endAngle, false);
      
      const dx = Math.sqrt(Math.max(0, rPx*rPx - dy*dy));
      const waveLeft = cx - dx;
      const waveRight = cx + dx;
      
      for (let i = 0; i <= 40; i++) {
        const t = i/40;
        const x = waveLeft + t * (waveRight - waveLeft);
        const wave = Math.sin(t * 3 * Math.PI * 2) * 3;
        ctxFront.lineTo(x, y_surface + wave);
      }
      
      ctxFront.closePath();
      ctxFront.fill();
      ctxFront.restore();
    } else if (h >= 2 * R) {
      ctxFront.save();
      ctxFront.beginPath();
      ctxFront.arc(cx, cy, rPx, 0, 2*Math.PI);
      ctxFront.clip();
      const fuelGrad = ctxFront.createRadialGradient(cx, cy, 0, cx, cy, rPx);
      fuelGrad.addColorStop(0, '#ffdd75');
      fuelGrad.addColorStop(0.5, '#f7b32b');
      fuelGrad.addColorStop(1, '#a86d0f');
      ctxFront.fillStyle = fuelGrad;
      ctxFront.fillRect(0, 0, size, size);
      ctxFront.restore();
    }

    ctxFront.beginPath();
    ctxFront.arc(cx, cy, rPx, 0, 2*Math.PI);
    ctxFront.strokeStyle = '#5a5a6a';
    ctxFront.lineWidth = 2;
    ctxFront.stroke();

    ctxFront.font = 'bold 14px sans-serif';
    ctxFront.textAlign = 'center';
    ctxFront.fillStyle = 'rgba(0,0,0,0.7)';
    ctxFront.fillRect(cx - 60, cy - 18, 120, 36);
    ctxFront.fillStyle = '#fff';
    ctxFront.fillText(`${liquidVol.toFixed(2)} м³`, cx, cy - 5);
    ctxFront.fillText(`${percentVal.toFixed(1)}%`, cx, cy + 10);
  }

  function drawSide(R, L, h) {
    const width = 400, height = 200, pad = 16;
    const scaleX = (width - 2*pad) / L;
    const scaleY = (height - 2*pad) / (2*R);

    ctxSide.clearRect(0, 0, width, height);
    ctxSide.fillStyle = '#252530';
    ctxSide.fillRect(pad, pad, L*scaleX, 2*R*scaleY);
    ctxSide.strokeStyle = '#5a5a6a';
    ctxSide.lineWidth = 2;
    ctxSide.strokeRect(pad, pad, L*scaleX, 2*R*scaleY);

    if (h > 0) {
      const liquidH = Math.min(h, 2*R) * scaleY;
      const liquidY = pad + (2*R*scaleY) - liquidH;
      
      const fuelGrad = ctxSide.createLinearGradient(pad, liquidY, pad, liquidY + liquidH);
      fuelGrad.addColorStop(0, '#ffdd75');
      fuelGrad.addColorStop(0.4, '#f7b32b');
      fuelGrad.addColorStop(1, '#a86d0f');
      
      ctxSide.fillStyle = fuelGrad;
      ctxSide.fillRect(pad, liquidY, L*scaleX, liquidH);
    }

    ctxSide.font = '11px sans-serif';
    ctxSide.fillStyle = '#bbb';
    ctxSide.fillText(`L = ${L.toFixed(2)} м`, pad + 10, pad + 20);
  }

  function update() {
    const { liquid, full, percent, R, h, maxH } = calculate();
    
    volumeSpan.textContent = liquid.toFixed(3);
    percentSpan.textContent = percent.toFixed(1);
    fullVolumeSpan.textContent = full.toFixed(3);
    sideLengthLabel.textContent = length.toFixed(2);
    
    const density = parseFloat(densityInput.value) || 830;
    weightValue.textContent = (liquid * density).toFixed(1);
    
    diameterDisplay.value = (2 * R).toFixed(3) + ' м';
    
    levelSlider.max = maxH.toFixed(2);
    levelInput.max = maxH.toFixed(2);
    
    if (level > maxH) {
      level = maxH;
      levelSlider.value = level.toFixed(2);
      levelInput.value = level.toFixed(2);
    }
    
    drawFront(R, h, liquid, percent);
    drawSide(R, length, h);
  }

  function animate() {
    update();
    animFrame = requestAnimationFrame(animate);
  }

  radiusInput.addEventListener('input', (e) => {
    const val = parseFloat(e.target.value);
    if (val >= 0.1 && val <= 10) {
      radius = val;
      update();
    }
  });

  lengthInput.addEventListener('input', (e) => {
    const val = parseFloat(e.target.value);
    if (val >= 0.1 && val <= 50) {
      length = val;
      update();
    }
  });

  levelSlider.addEventListener('input', (e) => {
    level = parseFloat(e.target.value);
    levelInput.value = level.toFixed(2);
    update();
  });

  levelInput.addEventListener('input', (e) => {
    const val = parseFloat(e.target.value);
    const maxH = 2 * getInnerRadius();
    if (val >= 0 && val <= maxH) {
      level = val;
      levelSlider.value = level;
      update();
    }
  });

  densityInput.addEventListener('input', update);

  document.querySelectorAll('input[name="radiusType"]').forEach(radio => {
    radio.addEventListener('change', (e) => {
      isOuter = e.target.value === 'outer';
      document.getElementById('wallThicknessInput').disabled = !isOuter;
      update();
    });
  });

  document.getElementById('wallThicknessInput').addEventListener('input', (e) => {
    const val = parseInt(e.target.value);
    if (val >= 1 && val <= 500) {
      wallThicknessMM = val;
      update();
    }
  });

  document.querySelectorAll('.preset-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      densityInput.value = btn.dataset.density;
      update();
    });
  });

  radiusInput.value = radius;
  lengthInput.value = length;
  levelSlider.value = level;
  levelInput.value = level;
  
  update();
  animate();
})();
</script>
</body>
</html>
