    </div>

        <label data-i18n="fuelLevel">⛽ Уровень бензина</label>

<script>
  (function() {
    "use strict";

    // ---------- Переводы ----------
    const translations = {
      ru: {
        title: 'Калькулятор топлива',
        radius: '📏 Радиус R (м)',
        length: '📐 Длина L (м)',
        maxLevel: '⚡ Макс. уровень',
        fullVolume: 'Полный',
        fuelLevel: '⛽ Уровень бензина',
        sliderHint: '⚡ двигайте ползунок',
        volume: 'Объём',
        filled: 'Заполнено',
        crossSection: '🔵 Поперечный разрез',
        sideView: '⬅️ Вид сбоку'
      },
      en: {
        title: 'Fuel Calculator',
        radius: '📏 Radius R (m)',
        length: '📐 Length L (m)',
        maxLevel: '⚡ Max level',
        fullVolume: 'Full',
        fuelLevel: '⛽ Fuel level',
        sliderHint: '⚡ slide to adjust',
        volume: 'Volume',
        filled: 'Filled',
        crossSection: '🔵 Cross section',
        sideView: '⬅️ Side view'
      }
    };

    let currentLang = 'ru';

    function applyLanguage(lang) {
      currentLang = lang;
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (translations[lang] && translations[lang][key]) {
          el.textContent = translations[lang][key];
        }
      });
      // Обновляем заголовок страницы
      document.title = translations[lang].title + ' 🛢️';
      
      // Кнопки переключения
      document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.lang === lang);
      });
      
      // Обновляем подпись длины в боковом виде (там часть текста динамическая)
      const sideViewSpan = document.querySelector('[data-i18n="sideView"]');
      if (sideViewSpan) {
        // Ничего не делаем, текст уже обновлён
      }
    }

    // Определение языка браузера
    function detectLanguage() {
      const browserLang = navigator.language || navigator.userLanguage || 'ru';
      return browserLang.startsWith('ru') ? 'ru' : 'en';
    }

    // Переключение по клику
    document.querySelectorAll('.lang-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        applyLanguage(btn.dataset.lang);
      });
    });

    // Применяем язык при старте
    applyLanguage(detectLanguage());

    // ---------- Логика калькулятора ----------
    const radiusInput = document.getElementById('radiusInput');
    const lengthInput = document.getElementById('lengthInput');
    const diameterDisplay = document.getElementById('diameterDisplay');
    const levelSlider = document.getElementById('levelSlider');
    const levelDisplay = document.getElementById('levelDisplay');
    const volumeSpan = document.getElementById('volumeValue');
    const percentSpan = document.getElementById('percentValue');
    const fullVolumeSpan = document.getElementById('fullVolumeValue');
    const sideLengthLabel = document.getElementById('sideLengthLabel');
    const frontCanvas = document.getElementById('frontCanvas');
    const sideCanvas = document.getElementById('sideCanvas');
    const ctxFront = frontCanvas.getContext('2d');
    const ctxSide = sideCanvas.getContext('2d');

    let radius = 1.2;
    let length = 4.5;
    let level = 1.0;

    function segmentArea(R, h) {
      if (h <= 0) return 0;
      if (h >= 2 * R) return Math.PI * R * R;
      const y = R - h;
      const acosArg = Math.min(1, Math.max(-1, y / R));
      return R * R * Math.acos(acosArg) - y * Math.sqrt(Math.max(0, R*R - y*y));
    }

    function calculateVolumes() {
      const R = radius;
      const L = length;
      const h = Math.min(level, 2 * R);
      const area = segmentArea(R, h);
      const liquid = area * L;
      const full = Math.PI * R * R * L;
      const percent = full > 0 ? (liquid / full) * 100 : 0;
      return { liquid, full, percent };
    }

    // Рисование с гарантированно полной подложкой
    function drawFrontCanvas(R, h, liquidVol, percentVal) {
      const size = 300;
      const padding = 18;
      const drawable = size - 2 * padding;
      const scale = drawable / (2 * R);
      
      ctxFront.clearRect(0, 0, size, size);
      const cx = size / 2;
      const cy = size / 2;
      const rPx = R * scale;
      
      // Фон цистерны
      ctxFront.beginPath();
      ctxFront.arc(cx, cy, rPx, 0, 2 * Math.PI);
      ctxFront.fillStyle = '#1e3647';
      ctxFront.fill();
      ctxFront.strokeStyle = '#6b8fa7';
      ctxFront.lineWidth = 2.2;
      ctxFront.stroke();
      
      const bottomY = cy + rPx;
      const liquidH = h * scale;
      const liquidTopY = bottomY - liquidH;
      
      ctxFront.save();
      ctxFront.beginPath();
      ctxFront.arc(cx, cy, rPx, 0, 2 * Math.PI);
      ctxFront.clip();
      
      const grad = ctxFront.createLinearGradient(cx, liquidTopY, cx, bottomY);
      grad.addColorStop(0, '#f9d56e');
      grad.addColorStop(1, '#d4a017');
      ctxFront.fillStyle = grad;
      ctxFront.fillRect(0, liquidTopY, size, bottomY - liquidTopY);
      ctxFront.restore();
      
      ctxFront.beginPath();
      ctxFront.arc(cx, cy, rPx, 0, 2 * Math.PI);
      ctxFront.strokeStyle = '#d4e6f5';
      ctxFront.lineWidth = 2.5;
      ctxFront.stroke();
      
      const yFromCenter = R - h;
      const halfChord = Math.sqrt(Math.max(0, R*R - yFromCenter*yFromCenter)) * scale;
      ctxFront.beginPath();
      ctxFront.moveTo(cx - halfChord, liquidTopY);
      ctxFront.lineTo(cx + halfChord, liquidTopY);
      ctxFront.strokeStyle = '#ffffffcc';
      ctxFront.lineWidth = 2.2;
      ctxFront.stroke();
      
      // Текст с фоном (исправлено: полное перекрытие)
      ctxFront.font = 'bold 14px "Segoe UI", sans-serif';
      ctxFront.textAlign = 'center';
      const text1 = `${liquidVol.toFixed(2)} м³`;
      const text2 = `${percentVal.toFixed(1)}%`;
      
      const metrics1 = ctxFront.measureText(text1);
      const metrics2 = ctxFront.measureText(text2);
      const maxWidth = Math.max(metrics1.width, metrics2.width) + 20;
      
      const lineHeight = 20; // примерно высота строки
      const textY1 = cy - 6;
      const textY2 = cy + 14;
      const boxY = textY1 - 16;
      const boxHeight = 38;
      
      ctxFront.fillStyle = '#0a1c2ae0';
      ctxFront.shadowBlur = 0;
      ctxFront.beginPath();
      ctxFront.rect(cx - maxWidth/2, boxY, maxWidth, boxHeight);
      ctxFront.fill();
      
      ctxFront.fillStyle = '#ffffff';
      ctxFront.shadowColor = '#000000b0';
      ctxFront.shadowBlur = 5;
      ctxFront.fillText(text1, cx, textY1);
      ctxFront.fillText(text2, cx, textY2);
      ctxFront.shadowBlur = 0;
      ctxFront.textAlign = 'left';
    }

    function drawSideCanvas(R, L, h) {
      const width = 400;
      const height = 200;
      const pad = 12;
      const drawW = width - 2 * pad;
      const drawH = height - 2 * pad;
      const scaleX = drawW / L;
      const scaleY = drawH / (2 * R);
      
      ctxSide.clearRect(0, 0, width, height);
      ctxSide.fillStyle = '#1e3647';
      ctxSide.fillRect(pad, pad, L * scaleX, 2 * R * scaleY);
      
      const liquidH = h * scaleY;
      const liquidY = pad + (2 * R * scaleY) - liquidH;
      
      const grad = ctxSide.createLinearGradient(pad, liquidY, pad + L*scaleX*0.5, liquidY+liquidH);
      grad.addColorStop(0, '#f7d654');
      grad.addColorStop(1, '#c9951e');
      ctxSide.fillStyle = grad;
      ctxSide.fillRect(pad, liquidY, L * scaleX, liquidH);
      
      ctxSide.strokeStyle = '#b0c7db';
      ctxSide.lineWidth = 2;
      ctxSide.strokeRect(pad, pad, L * scaleX, 2 * R * scaleY);
      
      ctxSide.beginPath();
      ctxSide.moveTo(pad, liquidY);
      ctxSide.lineTo(pad + L * scaleX, liquidY);
      ctxSide.strokeStyle = '#fff9e6';
      ctxSide.lineWidth = 1.8;
      ctxSide.setLineDash([5, 7]);
      ctxSide.stroke();
      ctxSide.setLineDash([]);
      
      ctxSide.font = '500 11px "Segoe UI", sans-serif';
      ctxSide.fillStyle = '#c5d9ee';
      ctxSide.fillText(`L = ${L.toFixed(2)} м`, pad + 8, pad + 18);
    }

    function updateUI() {
      const R = radius;
      const maxH = 2 * R;
      
      diameterDisplay.value = maxH.toFixed(3) + ' м';
      levelSlider.max = maxH;
      
      if (level > maxH) level = maxH;
      if (level < 0) level = 0;
      levelSlider.value = level;
      levelDisplay.textContent = level.toFixed(3) + ' м';
      
      const { liquid, full, percent } = calculateVolumes();
      volumeSpan.textContent = liquid.toFixed(3);
      percentSpan.textContent = percent.toFixed(1);
      fullVolumeSpan.textContent = full.toFixed(3);
      sideLengthLabel.textContent = length.toFixed(2);
      
      drawFrontCanvas(R, level, liquid, percent);
      drawSideCanvas(R, length, level);
    }

    // Валидация
    function validateRadius(val, input) {
      if (val === '') { input.classList.add('invalid'); return false; }
      const num = parseFloat(val);
      if (isNaN(num) || num < 0.1) { input.classList.add('invalid'); return false; }
      input.classList.remove('invalid');
      radius = Math.min(10, num);
      return true;
    }
    function validateLength(val, input) {
      if (val === '') { input.classList.add('invalid'); return false; }
      const num = parseFloat(val);
      if (isNaN(num) || num < 0.1) { input.classList.add('invalid'); return false; }
      input.classList.remove('invalid');
      length = Math.min(50, num);
      return true;
    }

    radiusInput.addEventListener('input', (e) => {
      if (validateRadius(e.target.value, e.target)) { 
        if (level > 2*radius) level = 2*radius;
        updateUI(); 
      }
    });
    lengthInput.addEventListener('input', (e) => {
      if (validateLength(e.target.value, e.target)) updateUI();
    });
    radiusInput.addEventListener('blur', (e) => {
      if (!validateRadius(e.target.value, e.target)) { radius = 1.2; }
      e.target.value = radius.toFixed(2);
      updateUI();
    });
    lengthInput.addEventListener('blur', (e) => {
      if (!validateLength(e.target.value, e.target)) { length = 4.5; }
      e.target.value = length.toFixed(2);
      updateUI();
    });
    levelSlider.addEventListener('input', () => {
      level = parseFloat(levelSlider.value);
      updateUI();
    });

    // Старт
    radius = 1.2; length = 4.5; level = 1.0;
    radiusInput.value = radius.toFixed(1);
    lengthInput.value = length.toFixed(1);
    updateUI();

    frontCanvas.addEventListener('touchstart', e => e.preventDefault(), {passive: false});
    sideCanvas.addEventListener('touchstart', e => e.preventDefault(), {passive: false});
  })();
</script>
</body>
</html>
