</div>

<script>
  (function() {
    "use strict";

    const translations = {
      ru: {
        title: 'Калькулятор топлива',
        radius: '📏 Радиус R (м)',
        length: '📐 Длина L (м)',
        maxLevel: '⚡ Макс. уровень',
        fullVolume: 'Полный',
        fuelLevel: '⛽ Уровень топлива',
        sliderHint: '⚡ двигайте ползунок',
        volume: 'Объём',
        filled: 'Заполнено',
        crossSection: '🔵 Поперечный разрез',
        sideView: '⬅️ Вид сбоку',
        innerRadius: 'Внутренний',
        outerRadius: 'Наружный',
        wallThickness: 'Стенка',
        meters: 'м',
        millimeters: 'мм'
      },
      en: {
        title: 'Fuel Calculator',
        radius: '📏 Radius R (m)',
        length: '📐 Length L (m)',
        maxLevel: '⚡ Max level',
        fullVolume: 'Full',
        fuelLevel: '⛽ Fuel level',
        sliderHint: '⚡ slide to adjust',
        volume: 'Volume',
        filled: 'Filled',
        crossSection: '🔵 Cross section',
        sideView: '⬅️ Side view',
        innerRadius: 'Inner',
        outerRadius: 'Outer',
        wallThickness: 'Wall',
        meters: 'm',
        millimeters: 'mm'
      }
    };

    let currentLang = 'ru';
    function applyLanguage(lang) {
      currentLang = lang;
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (translations[lang] && translations[lang][key]) {
          el.textContent = translations[lang][key];
        }
      });
      document.title = translations[lang].title + ' 🛢️';
      document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.lang === lang);
      });
    }
    function detectLanguage() {
      const browserLang = navigator.language || navigator.userLanguage || 'ru';
      return browserLang.startsWith('ru') ? 'ru' : 'en';
    }
    document.querySelectorAll('.lang-btn').forEach(btn => {
      btn.addEventListener('click', () => applyLanguage(btn.dataset.lang));
    });
    applyLanguage(detectLanguage());

    // Элементы
    const radiusInput = document.getElementById('radiusInput');
    const lengthInput = document.getElementById('lengthInput');
    const diameterDisplay = document.getElementById('diameterDisplay');
    const levelSlider = document.getElementById('levelSlider');
    const levelInput = document.getElementById('levelInput');
    const volumeSpan = document.getElementById('volumeValue');
    const percentSpan = document.getElementById('percentValue');
    const fullVolumeSpan = document.getElementById('fullVolumeValue');
    const sideLengthLabel = document.getElementById('sideLengthLabel');
    const frontCanvas = document.getElementById('frontCanvas');
    const sideCanvas = document.getElementById('sideCanvas');
    const ctxFront = frontCanvas.getContext('2d');
    const ctxSide = sideCanvas.getContext('2d');

    const radioInner = document.querySelector('input[value="inner"]');
    const radioOuter = document.querySelector('input[value="outer"]');
    const wallInput = document.getElementById('wallThicknessInput');

    let radius = 1.2;
    let length = 4.5;
    let level = 1.0;
    let isOuter = false;
    let wallThicknessMM = 4;

    let lastValidRadius = 1.2;
    let lastValidLength = 4.5;
    let lastValidLevel = 1.0;
    let lastValidWallMM = 4;

    function getInnerRadius() {
      let R = radius;
      if (isOuter) {
        const wallM = wallThicknessMM / 1000;
        R = Math.max(0.001, radius - wallM);
      }
      return R;
    }

    function segmentArea(R, h) {
      if (h <= 0) return 0;
      if (h >= 2 * R) return Math.PI * R * R;
      const y = R - h;
      const acosArg = Math.min(1, Math.max(-1, y / R));
      return R * R * Math.acos(acosArg) - y * Math.sqrt(Math.max(0, R*R - y*y));
    }

    function calculateVolumes() {
      const R = getInnerRadius();
      const L = length;
      const h = Math.min(level, 2 * R);
      const area = segmentArea(R, h);
      const liquid = area * L;
      const full = Math.PI * R * R * L;
      const percent = full > 0 ? (liquid / full) * 100 : 0;
      return { liquid, full, percent };
    }

    function drawFrontCanvas(R, h, liquidVol, percentVal) {
      const size = 300;
      const padding = 14;
      const drawable = size - 2 * padding;
      const scale = drawable / (2 * R);
      
      ctxFront.clearRect(0, 0, size, size);
      const cx = size / 2;
      const cy = size / 2;
      const rPx = R * scale;
      
      ctxFront.beginPath();
      ctxFront.arc(cx, cy, rPx, 0, 2 * Math.PI);
      ctxFront.fillStyle = '#eef3f8';
      ctxFront.fill();
      ctxFront.strokeStyle = '#b0c4d9';
      ctxFront.lineWidth = 2;
      ctxFront.stroke();
      
      const bottomY = cy + rPx;
      const liquidH = h * scale;
      const liquidTopY = bottomY - liquidH;
      
      ctxFront.save();
      ctxFront.beginPath();
      ctxFront.arc(cx, cy, rPx, 0, 2 * Math.PI);
      ctxFront.clip();
      
      const grad = ctxFront.createLinearGradient(cx, liquidTopY, cx, bottomY);
      grad.addColorStop(0, '#f9d56e');
      grad.addColorStop(1, '#d4a017');
      ctxFront.fillStyle = grad;
      ctxFront.fillRect(0, liquidTopY, size, bottomY - liquidTopY);
      ctxFront.restore();
      
      ctxFront.beginPath();
      ctxFront.arc(cx, cy, rPx, 0, 2 * Math.PI);
      ctxFront.strokeStyle = '#a0b8cc';
      ctxFront.lineWidth = 2;
      ctxFront.stroke();
      
      const yFromCenter = R - h;
      const halfChord = Math.sqrt(Math.max(0, R*R - yFromCenter*yFromCenter)) * scale;
      ctxFront.beginPath();
      ctxFront.moveTo(cx - halfChord, liquidTopY);
      ctxFront.lineTo(cx + halfChord, liquidTopY);
      ctxFront.strokeStyle = '#ffffff';
      ctxFront.lineWidth = 2;
      ctxFront.shadowColor = '#00000020';
      ctxFront.shadowBlur = 4;
      ctxFront.stroke();
      ctxFront.shadowBlur = 0;
      
      ctxFront.font = 'bold 12px -apple-system, "Segoe UI", sans-serif';
      ctxFront.textAlign = 'center';
      const text1 = `${liquidVol.toFixed(2)} м³`;
      const text2 = `${percentVal.toFixed(1)}%`;
      
      const metrics1 = ctxFront.measureText(text1);
      const metrics2 = ctxFront.measureText(text2);
      const maxWidth = Math.max(metrics1.width, metrics2.width) + 16;
      
      const textY1 = cy - 4;
      const textY2 = cy + 12;
      const boxY = textY1 - 12;
      const boxHeight = 30;
      
      ctxFront.fillStyle = '#1c1c1ee0';
      ctxFront.shadowBlur = 0;
      ctxFront.beginPath();
      ctxFront.rect(cx - maxWidth/2, boxY, maxWidth, boxHeight);
      ctxFront.fill();
      
      ctxFront.fillStyle = '#ffffff';
      ctxFront.shadowColor = '#00000040';
      ctxFront.shadowBlur = 4;
      ctxFront.fillText(text1, cx, textY1);
      ctxFront.fillText(text2, cx, textY2);
      ctxFront.shadowBlur = 0;
      ctxFront.textAlign = 'left';
    }

    function drawSideCanvas(R, L, h) {
      const width = 400;
      const height = 200;
      const pad = 10;
      const drawW = width - 2 * pad;
      const drawH = height - 2 * pad;
      const scaleX = drawW / L;
      const scaleY = drawH / (2 * R);
      
      ctxSide.clearRect(0, 0, width, height);
      ctxSide.fillStyle = '#eef3f8';
      ctxSide.fillRect(pad, pad, L * scaleX, 2 * R * scaleY);
      
      const liquidH = h * scaleY;
      const liquidY = pad + (2 * R * scaleY) - liquidH;
      
      const grad = ctxSide.createLinearGradient(pad, liquidY, pad + L*scaleX*0.5, liquidY+liquidH);
      grad.addColorStop(0, '#f7d654');
      grad.addColorStop(1, '#c9951e');
      ctxSide.fillStyle = grad;
      ctxSide.fillRect(pad, liquidY, L * scaleX, liquidH);
      
      ctxSide.strokeStyle = '#a0b8cc';
      ctxSide.lineWidth = 1.8;
      ctxSide.strokeRect(pad, pad, L * scaleX, 2 * R * scaleY);
      
      ctxSide.beginPath();
      ctxSide.moveTo(pad, liquidY);
      ctxSide.lineTo(pad + L * scaleX, liquidY);
      ctxSide.strokeStyle = '#ffffff';
      ctxSide.lineWidth = 1.8;
      ctxSide.shadowColor = '#00000020';
      ctxSide.shadowBlur = 4;
      ctxSide.setLineDash([4, 5]);
      ctxSide.stroke();
      ctxSide.setLineDash([]);
      ctxSide.shadowBlur = 0;
      
      ctxSide.font = '500 10px -apple-system, "Segoe UI", sans-serif';
      ctxSide.fillStyle = '#3a4c5e';
      ctxSide.fillText(`L = ${L.toFixed(2)} м`, pad + 6, pad + 18);
    }

    function formatLevelValue(val) {
      return parseFloat(val.toFixed(3)).toString();
    }

    function updateUI() {
      const R = getInnerRadius();
      const maxH = 2 * R;
      
      diameterDisplay.value = maxH.toFixed(3) + ' м';
      levelSlider.max = maxH;
      levelInput.max = maxH.toFixed(3);
      
      if (level > maxH) level = maxH;
      if (level < 0) level = 0;
      
      levelSlider.value = level;
      if (document.activeElement !== levelInput) {
        levelInput.value = formatLevelValue(level);
      }
      
      const { liquid, full, percent } = calculateVolumes();
      volumeSpan.textContent = liquid.toFixed(3);
      percentSpan.textContent = percent.toFixed(1);
      fullVolumeSpan.textContent = full.toFixed(3);
      sideLengthLabel.textContent = length.toFixed(2);
      
      drawFrontCanvas(R, level, liquid, percent);
      drawSideCanvas(R, length, level);
    }

    function handleRadiusInput(e) {
      const val = e.target.value;
      if (val === '') return;
      const num = parseFloat(val);
      if (!isNaN(num) && num >= 0.1 && num <= 10) {
        radius = num;
        lastValidRadius = num;
        e.target.classList.remove('invalid');
        if (level > 2 * getInnerRadius()) level = 2 * getInnerRadius();
        updateUI();
      } else {
        e.target.classList.add('invalid');
      }
    }
    function handleRadiusBlur(e) {
      const val = e.target.value;
      if (val === '' || isNaN(parseFloat(val)) || parseFloat(val) < 0.1 || parseFloat(val) > 10) {
        radius = lastValidRadius;
        e.target.value = radius.toFixed(2);
        e.target.classList.remove('invalid');
        updateUI();
      } else {
        radius = parseFloat(val);
        lastValidRadius = radius;
        e.target.value = radius.toFixed(2);
        updateUI();
      }
    }

    function handleLengthInput(e) {
      const val = e.target.value;
      if (val === '') return;
      const num = parseFloat(val);
      if (!isNaN(num) && num >= 0.1 && num <= 50) {
        length = num;
        lastValidLength = num;
        e.target.classList.remove('invalid');
        updateUI();
      } else {
        e.target.classList.add('invalid');
      }
    }
    function handleLengthBlur(e) {
      const val = e.target.value;
      if (val === '' || isNaN(parseFloat(val)) || parseFloat(val) < 0.1 || parseFloat(val) > 50) {
        length = lastValidLength;
        e.target.value = length.toFixed(2);
        e.target.classList.remove('invalid');
        updateUI();
      } else {
        length = parseFloat(val);
        lastValidLength = length;
        e.target.value = length.toFixed(2);
        updateUI();
      }
    }

    function handleWallInput(e) {
      if (!isOuter) return;
      const val = e.target.value;
      if (val === '') return;
      const num = parseInt(val, 10);
      if (!isNaN(num) && num >= 1 && num <= 500) {
        wallThicknessMM = num;
        lastValidWallMM = num;
        e.target.classList.remove('invalid');
        if (level > 2 * getInnerRadius()) level = 2 * getInnerRadius();
        updateUI();
      } else {
        e.target.classList.add('invalid');
      }
    }
    function handleWallBlur(e) {
      if (!isOuter) return;
      const val = e.target.value;
      if (val === '' || isNaN(parseInt(val, 10)) || parseInt(val, 10) < 1 || parseInt(val, 10) > 500) {
        wallThicknessMM = lastValidWallMM;
        e.target.value = wallThicknessMM;
        e.target.classList.remove('invalid');
        updateUI();
      } else {
        wallThicknessMM = parseInt(val, 10);
        lastValidWallMM = wallThicknessMM;
        e.target.value = wallThicknessMM;
        updateUI();
      }
    }

    function handleLevelInput(e) {
      const val = e.target.value;
      if (val === '') return;
      const num = parseFloat(val);
      const maxH = 2 * getInnerRadius();
      if (!isNaN(num) && num >= 0 && num <= maxH) {
        level = num;
        lastValidLevel = num;
        levelSlider.value = level;
        e.target.classList.remove('invalid');
        const R = getInnerRadius();
        const { liquid, full, percent } = calculateVolumes();
        volumeSpan.textContent = liquid.toFixed(3);
        percentSpan.textContent = percent.toFixed(1);
        fullVolumeSpan.textContent = full.toFixed(3);
        sideLengthLabel.textContent = length.toFixed(2);
        drawFrontCanvas(R, level, liquid, percent);
        drawSideCanvas(R, length, level);
        diameterDisplay.value = (2 * R).toFixed(3) + ' м';
      } else {
        e.target.classList.add('invalid');
      }
    }
    function handleLevelBlur(e) {
      const val = e.target.value;
      const maxH = 2 * getInnerRadius();
      if (val === '' || isNaN(parseFloat(val)) || parseFloat(val) < 0 || parseFloat(val) > maxH) {
        level = lastValidLevel;
        e.target.value = formatLevelValue(level);
        e.target.classList.remove('invalid');
        updateUI();
      } else {
        level = parseFloat(val);
        lastValidLevel = level;
        e.target.value = formatLevelValue(level);
        updateUI();
      }
    }

    radiusInput.addEventListener('input', handleRadiusInput);
    radiusInput.addEventListener('blur', handleRadiusBlur);
    lengthInput.addEventListener('input', handleLengthInput);
    lengthInput.addEventListener('blur', handleLengthBlur);
    wallInput.addEventListener('input', handleWallInput);
    wallInput.addEventListener('blur', handleWallBlur);
    levelInput.addEventListener('input', handleLevelInput);
    levelInput.addEventListener('blur', handleLevelBlur);
    
    levelSlider.addEventListener('input', () => {
      level = parseFloat(levelSlider.value);
      lastValidLevel = level;
      levelInput.value = formatLevelValue(level);
      updateUI();
    });

    radioInner.addEventListener('change', () => {
      isOuter = false;
      wallInput.disabled = true;
      if (level > 2 * getInnerRadius()) level = 2 * getInnerRadius();
      updateUI();
    });
    radioOuter.addEventListener('change', () => {
      isOuter = true;
      wallInput.disabled = false;
      if (level > 2 * getInnerRadius()) level = 2 * getInnerRadius();
      updateUI();
    });

    // Старт
    radius = 1.2; length = 4.5; level = 1.0; wallThicknessMM = 4;
    lastValidRadius = radius; lastValidLength = length; lastValidLevel = level; lastValidWallMM = wallThicknessMM;
    radiusInput.value = radius.toFixed(1);
    lengthInput.value = length.toFixed(1);
    wallInput.value = wallThicknessMM;
    updateUI();

    frontCanvas.addEventListener('touchstart', e => e.preventDefault(), {passive: false});
    sideCanvas.addEventListener('touchstart', e => e.preventDefault(), {passive: false});
  })();
</script>
</body>
</html>
